<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera — MapMaker Education Assistant</title>
  <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f7f8f4;
      font-family: 'Georgia', serif;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      border: 1px solid #6BC878;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    /* Soft green top stripe */
    .top-stripe {
      background: #35AC46;
      height: 4px;
      width: 100%;
      flex-shrink: 0;
    }

    /* Subtle header */
    .header {
      background: #f0f5f0;
      padding: 12px 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid #6BC878;
    }

    /* Small leaf-dot accent */
    .header-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #35AC46;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .header-top-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header-ask {
      color: #288835;
      font-family: 'Georgia', serif;
      font-size: 20px;
      font-style: italic;
      font-weight: bold;
    }

    .header-name {
      color: #288835;
      font-family: 'Georgia', serif;
      font-size: 20px;
      font-style: normal;
      font-weight: normal;
      letter-spacing: 0.4px;
      line-height: 1.5;
    }

    .header-tagline {
      color: #35AC46;
      font-family: 'Georgia', serif;
      font-size: 14px;
      font-style: normal;
      font-weight: normal;
      letter-spacing: 0.4px;
      padding-left: 0;
    }

    /* WebChat container */
    #webchat {
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    .loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-family: 'Georgia', serif;
      font-size: 13px;
      background: #f7f8f4;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="top-stripe"></div>
    <div class="header">
      <div class="header-dot"></div>
      <div class="header-text">
        <div class="header-top-row">
          <div class="header-ask">Ask Vera</div>
          <div class="header-name">&mdash; The National Geographic MapMaker AI Education Assistant</div>
        </div>
        <div class="header-tagline">Discover maps, layers and lessons with Vera.</div>
      </div>
    </div>
    <div id="webchat" role="main"></div>
  </div>

  <script>
    const tokenEndpoint = "https://68c61fd12475ebdd804374cf052e0d.0e.environment.api.powerplatform.com/powervirtualagents/botsbyschema/cr86a_Vera/directline/token?api-version=2022-03-01-preview";

    const styleOptions = {
      // Overall
      "accent": "#35AC46",
      "backgroundColor": "#f7f8f4",

      // Bot bubble — warm white
      "bubbleBackground": "#ffffff",
      "bubbleBorderColor": "#6BC878",
      "bubbleBorderRadius": 8,
      "bubbleBorderStyle": "solid",
      "bubbleBorderWidth": 1,
      "bubbleTextColor": "#2a2a2a",
      "bubbleNubSize": 0,
      "bubbleMaxWidth": 520,

      // User bubble — soft mid green
      "bubbleFromUserBackground": "#35AC46",
      "bubbleFromUserBorderColor": "#288835",
      "bubbleFromUserBorderRadius": 8,
      "bubbleFromUserBorderStyle": "solid",
      "bubbleFromUserBorderWidth": 1,
      "bubbleFromUserTextColor": "#ffffff",
      "bubbleFromUserNubSize": 0,

      // Bot avatar — muted green circle
      "botAvatarBackgroundColor": "#35AC46",
      "botAvatarInitials": "V",
      "showAvatarInGroup": "status",
      "avatarSize": 30,
      "avatarBorderRadius": "50%",

      // User avatar — hidden
      "userAvatarBackgroundColor": "#35AC46",
      "userAvatarInitials": "",

      // Send box
      "sendBoxBackground": "#f0f5f0",
      "sendBoxBorderTop": "solid 1px #6BC878",
      "sendBoxButtonColor": "#288835",
      "sendBoxButtonColorOnHover": "#35AC46",
      "sendBoxHeight": 50,
      "sendBoxTextColor": "#2a2a2a",
      "sendBoxPlaceholderColor": "#6BC878",

      // Suggested action buttons
      "suggestedActionBackground": "#ffffff",
      "suggestedActionBorderColor": "#35AC46",
      "suggestedActionBorderRadius": 20,
      "suggestedActionBorderWidth": 1,
      "suggestedActionTextColor": "#288835",
      "suggestedActionBackgroundColorOnHover": "#BDF2C4",
      "suggestedActionLayout": "stacked",
      "suggestedActionsStackedLayoutButtonTextWrap": true,

      // Typography
      "primaryFont": "Georgia, serif",
      "monospaceFont": "Consolas, monospace",

      // Spacing
      "paddingRegular": 12,
      "paddingWide": 16,

      // Timestamps
      "subtleColor": "#6BC878",
    };

    async function initChat() {
      try {
        const environmentEndPoint = tokenEndpoint.slice(0, tokenEndpoint.indexOf("/powervirtualagents"));
        const apiVersion = tokenEndpoint.slice(tokenEndpoint.indexOf("api-version")).split("=")[1];
        const regionalChannelSettingsURL = `${environmentEndPoint}/powervirtualagents/regionalchannelsettings?api-version=${apiVersion}`;

        const [regionalResponse, tokenResponse] = await Promise.all([
          fetch(regionalChannelSettingsURL),
          fetch(tokenEndpoint)
        ]);

        const regionalData = await regionalResponse.json();
        const tokenData = await tokenResponse.json();
        const directLineURL = regionalData.channelUrlsById.directline;

        const store = window.WebChat.createStore(
          {},
          ({ dispatch }) => next => action => {
            if (action.type === "DIRECT_LINE/CONNECT_FULFILLED") {
              dispatch({
                type: "DIRECT_LINE/POST_ACTIVITY",
                meta: { method: "keyboard" },
                payload: {
                  activity: {
                    channelData: { postBack: true },
                    name: "startConversation",
                    type: "event"
                  }
                }
              });
            }
            return next(action);
          }
        );

        window.WebChat.renderWebChat(
          {
            directLine: window.WebChat.createDirectLine({
              domain: `${directLineURL}v3/directline`,
              token: tokenData.token,
            }),
            styleOptions,
            store,
            locale: "en-US",
          },
          document.getElementById("webchat")
        );


        // Inject CSS to reduce internal whitespace after render
        setTimeout(() => {
          const style = document.createElement('style');
          style.textContent = `
            .webchat__basic-transcript__filler {
              display: none !important;
              flex: 0 !important;
              min-height: 0 !important;
            }
            .webchat__basic-transcript {
              padding-top: 0 !important;
            }
            .webchat__basic-transcript__activity {
              padding-top: 4px !important;
              padding-bottom: 4px !important;
            }

            /* Bubble content spacing */
            .webchat__bubble__content p {
              margin-bottom: 10px !important;
              line-height: 1.6 !important;
            }
            .webchat__bubble__content p:last-child {
              margin-bottom: 0 !important;
            }
            .webchat__bubble__content ul,
            .webchat__bubble__content ol {
              padding-left: 16px !important;
              margin: 8px 0 !important;
            }
            .webchat__bubble__content li {
              margin-bottom: 10px !important;
              line-height: 1.6 !important;
            }
            .webchat__bubble__content li:last-child {
              margin-bottom: 0 !important;
            }
            .webchat__bubble__content a {
              color: #288835 !important;
            }
            .webchat__bubble__content a:hover {
              color: #35AC46 !important;
            }

            /* Hide file upload/attachment button */
            .webchat__upload-button {
              display: none !important;
            }

            /* Constrain stacked buttons to content width */
            .webchat__suggested-actions__stacked,
            .webchat__suggested-actions {
              align-items: flex-start !important;
              padding: 0 12px !important;
            }
            .webchat__suggested-actions__stacked button,
            .webchat__suggested-actions button {
              width: auto !important;
              min-width: 0 !important;
            }
            .webchat__suggested-actions__item-box {
              width: auto !important;
              flex: 0 0 auto !important;
            }
            .webchat__suggested-action {
              width: auto !important;
            }
          `;
          document.head.appendChild(style);
        }, 500);

      } catch (err) {
        console.error("Vera failed to load:", err);
        document.getElementById("webchat").innerHTML =
          '<div class="loading">Unable to load. Please refresh the page.</div>';
      }
    }

    initChat();
  </script>
</body>
</html>
