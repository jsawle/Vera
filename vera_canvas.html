<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera — MapMaker AI Education Assistant</title>
  <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
  <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f7f8f4; font-family: 'Georgia', serif; }
    .wrapper { display: flex; flex-direction: column; width: 100%; height: 100vh; }
    .natgeo-stripe { background: #FFCC00; height: 4px; width: 100%; flex-shrink: 0; }
    .header { background: #1a1a1a; padding: 10px 16px; display: flex; align-items: center; flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .vera-badge { background: #FFCC00; color: #111; font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 3px 8px; }
    .header-title { color: #ffffff; font-family: 'Arial', sans-serif; font-size: 13px; font-weight: 400; letter-spacing: 0.5px; opacity: 0.85; }
    #webchat { flex: 1; overflow: hidden; }
    .vera-download-btn { display: inline-flex; align-items: center; gap: 8px; background: #AAD04B; color: #1a1a1a; font-family: 'Arial', sans-serif; font-size: 13px; font-weight: 700; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; margin-top: 12px; transition: background 0.2s ease; }
    .vera-download-btn:hover { background: #C2E075; }
    .vera-download-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #AAD04B; font-family: 'Arial', sans-serif; font-size: 12px; padding: 10px 16px; border-left: 3px solid #AAD04B; opacity: 0; transform: translateY(8px); transition: all 0.3s ease; pointer-events: none; z-index: 9999; }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="natgeo-stripe"></div>
    <div class="header">
      <div class="header-left">
        <span class="vera-badge">Vera</span>
        <span class="header-title">National Geographic MapMaker AI Education Assistant</span>
      </div>
    </div>
    <div id="webchat" role="main"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const conversationLog = [];

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function generateWordDoc() {
      if (!conversationLog.length) return;
      const { Document, Packer, Paragraph, TextRun, BorderStyle } = docx;
      const children = [];

      children.push(
        new Paragraph({ spacing: { before: 0, after: 120 }, children: [new TextRun({ text: "MapMaker Lesson Plan", bold: true, size: 40, font: "Arial", color: "1A1A1A" })] }),
        new Paragraph({ spacing: { before: 0, after: 320 }, border: { bottom: { style: BorderStyle.SINGLE, size: 6, color: "AAD04B", space: 4 } }, children: [new TextRun({ text: `Generated by Ask Vera · National Geographic MapMaker AI Education Agent · ${new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`, size: 16, font: "Arial", color: "888888", italics: true })] })
      );

      for (const msg of conversationLog) {
        const isVera = msg.role === 'bot';
        const cleanText = msg.text.replace('[DOWNLOAD_LESSON]', '').trim();
        if (!cleanText) continue;
        children.push(new Paragraph({ spacing: { before: 240, after: 60 }, children: [new TextRun({ text: isVera ? "VERA" : "TEACHER", bold: true, size: 18, font: "Arial", color: isVera ? "1A6B8A" : "444444" })] }));
        const lines = cleanText.split('\n').filter(l => l.trim());
        for (const line of lines) {
          children.push(new Paragraph({ spacing: { before: 0, after: 100 }, indent: isVera ? { left: 0 } : { left: 360 }, children: [new TextRun({ text: line.trim(), size: 20, font: "Arial", color: isVera ? "1A1A1A" : "555555" })] }));
        }
      }

      children.push(new Paragraph({ spacing: { before: 480, after: 0 }, border: { top: { style: BorderStyle.SINGLE, size: 4, color: "CCCCCC", space: 6 } }, children: [new TextRun({ text: "Ask Vera · mapmaker.nationalgeographic.org · National Geographic MapMaker AI Education Agent", size: 16, font: "Arial", color: "AAAAAA" })] }));

      const doc = new Document({ sections: [{ properties: { page: { size: { width: 12240, height: 15840 }, margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 } } }, children }] });
      const blob = await Packer.toBlob(doc);
      saveAs(blob, `Vera_Lesson_Plan_${new Date().toISOString().slice(0,10)}.docx`);
      showToast('Lesson plan downloaded as Word document');
    }

    function activityMiddleware() {
      return next => card => {
        const { activity } = card;
        if (activity.type === 'message' && activity.from.role === 'bot' && activity.text && activity.text.includes('[DOWNLOAD_LESSON]')) {
          const cleanText = activity.text.replace('[DOWNLOAD_LESSON]', '').trim();
          return () => React.createElement('div', { style: { padding: '0' } },
            cleanText ? React.createElement('div', { dangerouslySetInnerHTML: { __html: cleanText.replace(/\n/g, '<br>') }, style: { marginBottom: '8px' } }) : null,
            React.createElement('button', { className: 'vera-download-btn', onClick: generateWordDoc },
              React.createElement('svg', { viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2.5', strokeLinecap: 'round', strokeLinejoin: 'round' },
                React.createElement('path', { d: 'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4' }),
                React.createElement('polyline', { points: '7 10 12 15 17 10' }),
                React.createElement('line', { x1: '12', y1: '15', x2: '12', y2: '3' })
              ),
              ' Download Lesson Plan'
            )
          );
        }
        return next(card);
      };
    }

    const TOKEN_ENDPOINT = 'https://68c61fd12475ebdd804374cf052e0d.0e.environment.api.powerplatform.com/powervirtualagents/botsbyschema/cr86a_Vera/directline/token?api-version=2022-03-01-preview';

    async function init() {
      const res = await fetch(TOKEN_ENDPOINT);
      const { token } = await res.json();

      const store = window.WebChat.createStore({}, () => next => action => {
        if (action.type === 'DIRECT_LINE/POST_ACTIVITY') {
          const { activity } = action.payload;
          if (activity.type === 'message' && activity.text) conversationLog.push({ role: 'user', text: activity.text });
        }
        if (action.type === 'DIRECT_LINE/INCOMING_ACTIVITY') {
          const { activity } = action.payload;
          if (activity.type === 'message' && activity.from.role === 'bot' && activity.text) conversationLog.push({ role: 'bot', text: activity.text });
        }
        return next(action);
      });

      window.WebChat.renderWebChat({
        directLine: window.WebChat.createDirectLine({ token }),
        store,
        activityMiddleware,
        styleOptions: {
          backgroundColor: '#f7f8f4',
          bubbleBackground: '#ffffff',
          bubbleBorderColor: '#e8e8e8',
          bubbleBorderRadius: 4,
          bubbleBorderWidth: 1,
          bubbleFromUserBackground: '#AAD04B',
          bubbleFromUserBorderColor: '#AAD04B',
          bubbleFromUserBorderRadius: 4,
          bubbleFromUserTextColor: '#1a1a1a',
          bubbleTextColor: '#1a1a1a',
          fontSizeSmall: '13px',
          primaryFont: "'Georgia', serif",
          sendBoxBackground: '#ffffff',
          sendBoxBorderBottom: '2px solid #AAD04B',
          sendBoxBorderLeft: 'none',
          sendBoxBorderRight: 'none',
          sendBoxBorderTop: 'none',
          sendBoxButtonColor: '#AAD04B',
          sendBoxButtonColorOnHover: '#1A6B8A',
          sendBoxHeight: 48,
          sendBoxTextColor: '#1a1a1a',
          hideUploadButton: true,
          botAvatarBackgroundColor: '#C2E075',
          botAvatarInitials: 'V',
          userAvatarBackgroundColor: '#1a6b8a',
          userAvatarInitials: 'T',
          typingAnimationBackgroundImage: null,
        }
      }, document.getElementById('webchat'));
    }

    init();
  </script>
</body>
</html>
