<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera — MapMaker Education Assistant</title>
  <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f7f8f4;
      font-family: 'Georgia', serif;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      border: 1px solid #6BC878;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    /* Soft green top stripe */
    .top-stripe {
      background: #35AC46;
      height: 4px;
      width: 100%;
      flex-shrink: 0;
    }

    /* Subtle header */
    .header {
      background: #f0f5f0;
      padding: 12px 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid #6BC878;
    }

    /* Small leaf-dot accent */
    .header-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #35AC46;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .header-top-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header-ask {
      color: #288835;
      font-family: 'Georgia', serif;
      font-size: 20px;
      font-style: italic;
      font-weight: bold;
    }

    .header-name {
      color: #288835;
      font-family: 'Georgia', serif;
      font-size: 20px;
      font-style: normal;
      font-weight: normal;
      letter-spacing: 0.4px;
      line-height: 1.5;
    }

    .header-tagline {
      color: #35AC46;
      font-family: 'Georgia', serif;
      font-size: 14px;
      font-style: normal;
      font-weight: normal;
      letter-spacing: 0.4px;
      padding-left: 0;
    }

    /* WebChat container */
    #webchat {
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    .loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-family: 'Georgia', serif;
      font-size: 13px;
      background: #f7f8f4;
    }

    /* PDF Save button — injected inline by JS */
    .vera-pdf-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 12px;
      padding: 9px 18px;
      background: #35AC46;
      color: #ffffff;
      border: none;
      border-radius: 20px;
      font-family: 'Georgia', serif;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease;
    }
    .vera-pdf-btn:hover {
      background: #288835;
    }
    .vera-pdf-btn svg {
      flex-shrink: 0;
    }

    /* ── Print stylesheet ───────────────────────────────────────────────────── */
    @media print {
      /* Hide everything by default */
      body * {
        visibility: hidden;
      }

      /* Show only the lesson plan content area */
      #vera-print-content,
      #vera-print-content * {
        visibility: visible;
      }

      #vera-print-content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        padding: 40px;
        font-family: Georgia, serif;
        font-size: 13pt;
        line-height: 1.7;
        color: #1a1a1a;
        background: white;
        height: auto;
        overflow: visible;
      }

      /* NatGeo-style header stripe */
      #vera-print-content::before {
        content: '';
        display: block;
        height: 6px;
        background: #35AC46;
        margin-bottom: 24px;
      }

      #vera-print-header {
        margin-bottom: 28px;
        padding-bottom: 16px;
        border-bottom: 1px solid #ccc;
      }

      #vera-print-header h1 {
        font-size: 22pt;
        color: #288835;
        font-style: italic;
        margin-bottom: 4px;
      }

      #vera-print-header p {
        font-size: 10pt;
        color: #666;
      }

      #vera-print-body {
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      #vera-print-body h2, #vera-print-body h3 {
        color: #288835;
        margin-top: 20px;
        margin-bottom: 8px;
      }

      #vera-print-body a {
        color: #288835;
      }

      #vera-print-body ul, #vera-print-body ol {
        padding-left: 20px;
        margin: 8px 0;
      }

      #vera-print-body li {
        margin-bottom: 6px;
      }

      /* Hide the PDF button itself when printing */
      .vera-pdf-btn {
        display: none !important;
      }

      @page {
        margin: 2cm;
        size: A4;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="top-stripe"></div>
    <div class="header">
      <div class="header-dot"></div>
      <div class="header-text">
        <div class="header-top-row">
          <div class="header-ask">Ask Vera</div>
          <div class="header-name">&mdash; The National Geographic MapMaker AI Education Assistant</div>
        </div>
        <div class="header-tagline">Discover maps, layers and lessons with Vera.</div>
      </div>
    </div>
    <div id="webchat" role="main"></div>
  </div>

  <!-- Hidden print container — populated by JS when lesson plan is ready -->
  <div id="vera-print-content" style="display:none;">
    <div id="vera-print-header">
      <h1>Ask Vera — Lesson Plan</h1>
      <p id="vera-print-date"></p>
    </div>
    <div id="vera-print-body"></div>
  </div>

  <script>
    const tokenEndpoint = "https://68c61fd12475ebdd804374cf052e0d.0e.environment.api.powerplatform.com/powervirtualagents/botsbyschema/cr86a_Vera/directline/token?api-version=2022-03-01-preview";

    const styleOptions = {
      // Overall
      "accent": "#35AC46",
      "backgroundColor": "#f7f8f4",

      // Bot bubble — warm white
      "bubbleBackground": "#ffffff",
      "bubbleBorderColor": "#6BC878",
      "bubbleBorderRadius": 8,
      "bubbleBorderStyle": "solid",
      "bubbleBorderWidth": 1,
      "bubbleTextColor": "#2a2a2a",
      "bubbleNubSize": 0,
      "bubbleMaxWidth": 520,

      // User bubble — soft mid green
      "bubbleFromUserBackground": "#35AC46",
      "bubbleFromUserBorderColor": "#288835",
      "bubbleFromUserBorderRadius": 8,
      "bubbleFromUserBorderStyle": "solid",
      "bubbleFromUserBorderWidth": 1,
      "bubbleFromUserTextColor": "#ffffff",
      "bubbleFromUserNubSize": 0,

      // Bot avatar — muted green circle
      "botAvatarBackgroundColor": "#35AC46",
      "botAvatarInitials": "V",
      "showAvatarInGroup": "status",
      "avatarSize": 30,
      "avatarBorderRadius": "50%",

      // User avatar — hidden
      "userAvatarBackgroundColor": "#35AC46",
      "userAvatarInitials": "",

      // Send box
      "sendBoxBackground": "#f0f5f0",
      "sendBoxBorderTop": "solid 1px #6BC878",
      "sendBoxButtonColor": "#288835",
      "sendBoxButtonColorOnHover": "#35AC46",
      "sendBoxHeight": 50,
      "sendBoxTextColor": "#2a2a2a",
      "sendBoxPlaceholderColor": "#6BC878",

      // Suggested action buttons
      "suggestedActionBackground": "#ffffff",
      "suggestedActionBorderColor": "#35AC46",
      "suggestedActionBorderRadius": 20,
      "suggestedActionBorderWidth": 1,
      "suggestedActionTextColor": "#288835",
      "suggestedActionBackgroundColorOnHover": "#BDF2C4",
      "suggestedActionLayout": "stacked",
      "suggestedActionsStackedLayoutButtonTextWrap": true,

      // Typography
      "primaryFont": "Georgia, serif",
      "monospaceFont": "Consolas, monospace",

      // Spacing
      "paddingRegular": 12,
      "paddingWide": 16,

      // Timestamps
      "subtleColor": "#6BC878",
    };

    // ── PDF helpers ────────────────────────────────────────────────────────────

    function collectLessonContent() {
      // Only collect bot bubbles that contain substantive lesson content.
      // Conversational messages are all under 200 chars; content bubbles are 1000+.
      // Threshold of 500 cleanly separates them.
      const bubbles = document.querySelectorAll('.webchat__bubble:not(.webchat__bubble--from-user) .webchat__bubble__content');
      let html = '';
      bubbles.forEach(bubble => {
        const text = bubble.innerText || bubble.textContent || '';
        if (text.trim().length > 500) {
          html += bubble.innerHTML + '<hr style="border:none;border-top:1px solid #ddd;margin:16px 0;">';
        }
      });
      return html || '<p>No lesson content found.</p>';
    }

    function triggerPDF() {
      const printBody = document.getElementById('vera-print-body');
      const printDate = document.getElementById('vera-print-date');
      const printContent = document.getElementById('vera-print-content');

      printBody.innerHTML = collectLessonContent();
      printDate.textContent = 'Generated by Vera on ' + new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      printContent.style.display = 'block';

      // Small delay to ensure DOM updates before print dialog opens
      setTimeout(() => {
        window.print();
        setTimeout(() => { printContent.style.display = 'none'; }, 1000);
      }, 200);
    }

    function injectPDFButton(bubbleContentEl) {
      // Replace [SAVE_AS_PDF] token with the button
      const html = bubbleContentEl.innerHTML;
      if (html.includes('[SAVE_AS_PDF]')) {
        const btn = document.createElement('button');
        btn.className = 'vera-pdf-btn';
        btn.innerHTML = `
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="12" y1="18" x2="12" y2="12"></line>
            <line x1="9" y1="15" x2="15" y2="15"></line>
          </svg>
          Save as PDF
        `;
        btn.addEventListener('click', triggerPDF);

        // Replace the token text with the button
        bubbleContentEl.innerHTML = html.replace('[SAVE_AS_PDF]', '');
        bubbleContentEl.appendChild(btn);
      }
    }

    // ── Poll for PDF token every second ───────────────────────────────────────

    function watchForPDFToken() {
      setInterval(() => {
        const bubbles = document.querySelectorAll(
          '.webchat__bubble:not(.webchat__bubble--from-user) .webchat__bubble__content'
        );
        bubbles.forEach(bubble => {
          if (bubble.innerHTML.includes('[SAVE_AS_PDF]') && !bubble.dataset.pdfInjected) {
            bubble.dataset.pdfInjected = 'true';
            injectPDFButton(bubble);
          }
        });
      }, 1000);
    }

    // ── Main init ──────────────────────────────────────────────────────────────

    async function initChat() {
      try {
        const environmentEndPoint = tokenEndpoint.slice(0, tokenEndpoint.indexOf("/powervirtualagents"));
        const apiVersion = tokenEndpoint.slice(tokenEndpoint.indexOf("api-version")).split("=")[1];
        const regionalChannelSettingsURL = `${environmentEndPoint}/powervirtualagents/regionalchannelsettings?api-version=${apiVersion}`;

        const [regionalResponse, tokenResponse] = await Promise.all([
          fetch(regionalChannelSettingsURL),
          fetch(tokenEndpoint)
        ]);

        const regionalData = await regionalResponse.json();
        const tokenData = await tokenResponse.json();
        const directLineURL = regionalData.channelUrlsById.directline;

        const store = window.WebChat.createStore(
          {},
          ({ dispatch }) => next => action => {
            if (action.type === "DIRECT_LINE/CONNECT_FULFILLED") {
              dispatch({
                type: "DIRECT_LINE/POST_ACTIVITY",
                meta: { method: "keyboard" },
                payload: {
                  activity: {
                    channelData: { postBack: true },
                    name: "startConversation",
                    type: "event"
                  }
                }
              });
            }
            return next(action);
          }
        );

        window.WebChat.renderWebChat(
          {
            directLine: window.WebChat.createDirectLine({
              domain: `${directLineURL}v3/directline`,
              token: tokenData.token,
            }),
            styleOptions,
            store,
            locale: "en-US",
          },
          document.getElementById("webchat")
        );

        // Start watching for the PDF token
        watchForPDFToken();

        // Inject CSS to reduce internal whitespace after render
        setTimeout(() => {
          const style = document.createElement('style');
          style.textContent = `
            .webchat__basic-transcript__filler {
              display: none !important;
              flex: 0 !important;
              min-height: 0 !important;
            }
            .webchat__basic-transcript {
              padding-top: 0 !important;
            }
            .webchat__basic-transcript__activity {
              padding-top: 4px !important;
              padding-bottom: 4px !important;
            }

            /* Bubble content spacing */
            .webchat__bubble__content p {
              margin-bottom: 10px !important;
              line-height: 1.6 !important;
            }
            .webchat__bubble__content p:last-child {
              margin-bottom: 0 !important;
            }
            .webchat__bubble__content ul,
            .webchat__bubble__content ol {
              padding-left: 16px !important;
              margin: 8px 0 !important;
            }
            .webchat__bubble__content li {
              margin-bottom: 10px !important;
              line-height: 1.6 !important;
            }
            .webchat__bubble__content li:last-child {
              margin-bottom: 0 !important;
            }
            .webchat__bubble__content a {
              color: #288835 !important;
            }
            .webchat__bubble__content a:hover {
              color: #35AC46 !important;
            }

            /* Hide file upload/attachment button */
            .webchat__upload-button {
              display: none !important;
            }

            /* Constrain stacked buttons to content width */
            .webchat__suggested-actions__stacked,
            .webchat__suggested-actions {
              align-items: flex-start !important;
              padding: 0 12px !important;
            }
            .webchat__suggested-actions__stacked button,
            .webchat__suggested-actions button {
              width: auto !important;
              min-width: 0 !important;
            }
            .webchat__suggested-actions__item-box {
              width: auto !important;
              flex: 0 0 auto !important;
            }
            .webchat__suggested-action {
              width: auto !important;
            }
            /* Override SDK scoped styles forcing full width */
            .webchat__suggested-actions__stack {
              display: flex !important;
              flex-direction: column !important;
              align-items: flex-start !important;
            }
            .webchat__suggested-actions__stack .webchat__suggested-actions__item-box {
              width: auto !important;
              max-width: 100% !important;
              flex: 0 0 auto !important;
            }
            .webchat__suggested-actions__stack button {
              width: auto !important;
              max-width: none !important;
            }
          `;
          document.head.appendChild(style);
        }, 500);

      } catch (err) {
        console.error("Vera failed to load:", err);
        document.getElementById("webchat").innerHTML =
          '<div class="loading">Unable to load. Please refresh the page.</div>';
      }
    }

    initChat();
  </script>
</body>
</html>
