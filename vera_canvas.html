<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera — MapMaker AI Education Assistant</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #111111;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }

    /* NatGeo yellow top bar — signature brand stripe */
    .natgeo-stripe {
      background: #FFCC00;
      height: 6px;
      width: 100%;
      flex-shrink: 0;
    }

    /* Header */
    .header {
      background: #111111;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      border-bottom: 1px solid #2a2a2a;
    }

    .natgeo-badge {
      background: #FFCC00;
      color: #111111;
      font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 8px;
      flex-shrink: 0;
    }

    .header-divider {
      width: 1px;
      height: 22px;
      background: #444;
      flex-shrink: 0;
    }

    .header-title {
      color: #ffffff;
      font-family: 'Georgia', serif;
      font-size: 14px;
      font-weight: normal;
      letter-spacing: 0.3px;
      opacity: 0.9;
    }

    .header-title span {
      color: #FFCC00;
      font-style: italic;
    }

    /* Chat iframe — fills all remaining space */
    .chat-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      background: #ffffff;
      min-height: 0; /* important for flex child to shrink correctly */
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="natgeo-stripe"></div>
    <div class="header">
      <div class="natgeo-badge">Vera</div>
      <div class="header-divider"></div>
      <div class="header-title">MapMaker AI Education Assistant &mdash; <span>Vera</span></div>
    </div>
    <iframe
      class="chat-frame"
      src="https://copilotstudio.microsoft.com/environments/68c61fd1-2475-ebdd-8043-74cf052e0d0e/bots/cr86a_Vera/webchat?__version__=2"
      allow="microphone"
      title="Vera — MapMaker AI Education Assistant">
    </iframe>
  </div>
</body>
</html>
